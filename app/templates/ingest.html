<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ingestion Pipeline</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=IBM+Plex+Mono:wght@400;600&display=swap");

      :root {
        --ink: #121212;
        --accent: #1b4332;
        --accent-2: #2d6a4f;
        --paper: #f5f1e7;
        --panel: #fffdf8;
        --danger: #9d0208;
        --muted: #56544f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Fraunces", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 20% 15%, #cad2c5 0%, transparent 45%),
          linear-gradient(130deg, #ede8dc, var(--paper));
        min-height: 100vh;
      }

      .wrap {
        max-width: 980px;
        margin: 40px auto;
        padding: 0 20px;
        animation: appear 420ms ease-out;
      }

      .panel {
        background: var(--panel);
        border: 2px solid #dad4c8;
        border-radius: 18px;
        box-shadow: 0 18px 30px rgba(12, 13, 12, 0.08);
        padding: 26px;
        margin-bottom: 18px;
        position: relative;
        overflow: hidden;
      }

      .panel::after {
        content: "";
        position: absolute;
        width: 260px;
        height: 260px;
        right: -110px;
        top: -110px;
        background: radial-gradient(circle, rgba(45, 106, 79, 0.16), transparent 65%);
        pointer-events: none;
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(1.65rem, 3vw, 2.2rem);
        line-height: 1.1;
        letter-spacing: 0.01em;
      }

      p {
        margin: 0 0 14px;
        color: var(--muted);
        max-width: 70ch;
      }

      label {
        display: block;
        margin: 12px 0 6px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      input[type="file"],
      textarea {
        width: 100%;
        border: 1px solid #cec6b6;
        border-radius: 8px;
        padding: 10px;
        font: 500 0.98rem/1.5 "Fraunces", serif;
        background: #fff;
      }

      textarea {
        min-height: 140px;
        resize: vertical;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        border: none;
        border-radius: 999px;
        background: var(--accent);
        color: #fff;
        padding: 10px 16px;
        cursor: pointer;
        font-family: "IBM Plex Mono", monospace;
        letter-spacing: 0.03em;
        font-weight: 600;
        transition: transform 120ms ease, filter 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        filter: brightness(1.05);
      }

      button.secondary {
        background: var(--accent-2);
      }

      button.retry {
        background: var(--danger);
      }

      .bar {
        margin-top: 12px;
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: #e7e7e7;
        overflow: hidden;
      }

      .bar > div {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        transition: width 0.2s ease;
      }

      pre {
        margin-top: 14px;
        padding: 12px;
        border-radius: 10px;
        background: #1f2937;
        color: #e5e7eb;
        overflow-x: auto;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.8rem;
      }

      .error {
        color: var(--danger);
        font-weight: 700;
      }

      @keyframes appear {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <h1>Lesson Source Ingestion</h1>
        <p>Upload PDF/PPTX/DOCX/TXT files or paste a topic. The API tracks queued, processing, completed, and failed states.</p>

        <label for="fileInput">Upload file</label>
        <input id="fileInput" type="file" accept=".pdf,.ppt,.pptx,.docx,.txt" />

        <label for="topicInput">Or paste a topic / outline</label>
        <textarea id="topicInput" placeholder="Paste topic notes, outline, or learning objectives"></textarea>

        <div class="actions">
          <button id="uploadBtn">Upload File</button>
          <button id="topicBtn" class="secondary">Ingest Topic Text</button>
          <button id="retryBtn" class="retry" style="display:none">Retry Failed Ingestion</button>
        </div>

        <div class="bar" aria-label="upload progress">
          <div id="barFill"></div>
        </div>

        <p id="statusText">Idle</p>
        <p id="errorText" class="error"></p>
        <pre id="result"></pre>
      </div>
    </div>

    <script>
      const uploadBtn = document.getElementById('uploadBtn');
      const topicBtn = document.getElementById('topicBtn');
      const retryBtn = document.getElementById('retryBtn');
      const fileInput = document.getElementById('fileInput');
      const topicInput = document.getElementById('topicInput');
      const statusText = document.getElementById('statusText');
      const errorText = document.getElementById('errorText');
      const result = document.getElementById('result');
      const barFill = document.getElementById('barFill');

      let activeSourceId = null;

      function setProgress(value) {
        barFill.style.width = `${Math.max(0, Math.min(100, value))}%`;
      }

      function setStatus(msg) {
        statusText.textContent = msg;
      }

      function clearError() {
        errorText.textContent = '';
      }

      function showError(msg) {
        errorText.textContent = msg;
      }

      async function pollStatus(sourceId) {
        activeSourceId = sourceId;
        retryBtn.style.display = 'none';

        for (;;) {
          const res = await fetch(`/api/ingest/${sourceId}`);
          const data = await res.json();
          result.textContent = JSON.stringify(data, null, 2);

          if (data.status === 'queued') {
            setStatus('Queued for parsing...');
            setProgress(30);
          } else if (data.status === 'processing') {
            setStatus('Parsing and chunking content...');
            setProgress(65);
          } else if (data.status === 'completed') {
            setStatus(`Completed: ${data.chunk_count || 0} chunks generated.`);
            setProgress(100);
            return;
          } else if (data.status === 'failed') {
            setStatus('Failed');
            showError(data.error_message || 'Ingestion failed');
            setProgress(100);
            retryBtn.style.display = 'inline-block';
            return;
          }

          await new Promise((resolve) => setTimeout(resolve, 1200));
        }
      }

      uploadBtn.addEventListener('click', async () => {
        clearError();
        const file = fileInput.files[0];
        if (!file) {
          showError('Select a file first.');
          return;
        }

        const formData = new FormData();
        formData.append('file', file);
        setProgress(2);
        setStatus('Uploading file...');

        await new Promise((resolve) => {
          const xhr = new XMLHttpRequest();
          xhr.open('POST', '/api/ingest', true);
          xhr.upload.onprogress = (event) => {
            if (!event.lengthComputable) {
              return;
            }
            const pct = (event.loaded / event.total) * 25;
            setProgress(pct);
          };
          xhr.onload = async () => {
            try {
              const data = JSON.parse(xhr.responseText || '{}');
              if (xhr.status >= 400) {
                throw new Error(data.error || `Upload failed (${xhr.status})`);
              }
              result.textContent = JSON.stringify(data, null, 2);
              await pollStatus(data.id);
            } catch (err) {
              showError(err.message);
              setStatus('Idle');
              setProgress(0);
            }
            resolve();
          };
          xhr.onerror = () => {
            showError('Network error while uploading file');
            setStatus('Idle');
            setProgress(0);
            resolve();
          };
          xhr.send(formData);
        });
      });

      topicBtn.addEventListener('click', async () => {
        clearError();
        const text = topicInput.value.trim();
        if (!text) {
          showError('Add topic text first.');
          return;
        }

        setStatus('Submitting topic text...');
        setProgress(20);
        const res = await fetch('/api/ingest', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });

        const data = await res.json();
        result.textContent = JSON.stringify(data, null, 2);
        if (!res.ok) {
          showError(data.error || 'Failed to ingest topic text');
          setStatus('Idle');
          setProgress(0);
          return;
        }
        await pollStatus(data.id);
      });

      retryBtn.addEventListener('click', async () => {
        if (!activeSourceId) return;

        clearError();
        setStatus('Retrying ingestion...');
        setProgress(12);
        const res = await fetch(`/api/ingest/${activeSourceId}/retry`, { method: 'POST' });
        const data = await res.json();
        result.textContent = JSON.stringify(data, null, 2);
        if (!res.ok) {
          showError(data.error || 'Retry failed');
          return;
        }
        await pollStatus(activeSourceId);
      });
    </script>
  </body>
</html>
